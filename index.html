    const { useState, useEffect } = React;



// ─── DATA ─────────────────────────────────────────────────────────────────────
const VENUES = [
  { id:"wentworthpark", name:"Wentworth Park",  state:"NSW", distances:[515,720] },
  { id:"bulli",         name:"Bulli",           state:"NSW", distances:[390,460] },
  { id:"grafton",       name:"Grafton",         state:"NSW", distances:[410,530] },
  { id:"meadows",       name:"The Meadows",     state:"VIC", distances:[525,600] },
  { id:"sandown",       name:"Sandown Park",    state:"VIC", distances:[515,595] },
  { id:"ballarat",      name:"Ballarat",        state:"VIC", distances:[450,520] },
  { id:"healesville",   name:"Healesville",     state:"VIC", distances:[300,457] },
  { id:"albionpark",    name:"Albion Park",     state:"QLD", distances:[431,520] },
  { id:"capalaba",      name:"Capalaba",        state:"QLD", distances:[431,520] },
  { id:"ipswich",       name:"Ipswich",         state:"QLD", distances:[431,520] },
  { id:"cannington",    name:"Cannington",      state:"WA",  distances:[403,520] },
  { id:"gloucester",    name:"Gloucester Park", state:"WA",  distances:[485,600] },
  { id:"anglepark",     name:"Angle Park",      state:"SA",  distances:[395,520] },
  { id:"gawler",        name:"Gawler",          state:"SA",  distances:[400,520] },
  { id:"launceston",    name:"Launceston",      state:"TAS", distances:[461,535] },
  { id:"devonport",     name:"Devonport",       state:"TAS", distances:[461,535] },
];

const FIRST = ["Bolt","Shadow","Red","Night","Storm","Gold","Swift","Iron","Mystic","Blue","Desert","King","Phantom","Silver","Apex","Lucky","Black","Turbo","Wild","Crimson","Flash","Jet","Thunder","Comet","Bullet","Sonic","Rocket","Blaze","Titan","Razor","Eagle","Hawk","Viper","Cobra","Ghost","Specter","Nova","Orbit","Laser","Atomic"];
const LAST  = ["Lightning","Chaser","Rocket","Fury","Rider","Rush","Arrow","Will","Dream","Thunder","Rose","Pin","Speed","Flash","Predator","Strike","Diamond","Charge","Wind","Tide","Fire","Bolt","Runner","Force","Shot","Dash","Star","Trail","Beast","Edge","Claw","Fang","Pulse","Surge","Breeze","Flame","Storm","Shadow","Quest","Blaze"];
const TRAINERS = ["J. Smith","M. Brown","T. Wilson","S. Davis","P. Johnson","A. Taylor","C. Martin","B. White","R. Lee","H. Clark","N. Hall","D. Adams","L. Baker","K. Nelson","F. Moore","G. Scott","E. Green","W. Hill","V. Young","Z. King"];
const GRADES   = ["Grade 5","Grade 4","Grade 3","Grade 2","Grade 1","Free For All","Maiden","Restricted Win","Mixed 5/6","Mixed 4/5"];

function rng(seed) { let s=seed; return ()=>{ s=(s*1664525+1013904223)&0xffffffff; return (s>>>0)/0xffffffff; }; }
function dogName(r) { return FIRST[Math.floor(r()*FIRST.length)]+" "+LAST[Math.floor(r()*LAST.length)]; }
function formStr(r) { return Array.from({length:5},()=>{ const v=r(); return v<.05?"F":v<.1?"D":String(Math.floor(v*6)+1); }).join("-"); }

function generateMeetings() {
  const baseHour = new Date(); baseHour.setMinutes(0,0,0);
  const startMs  = baseHour.getTime() + 60*60000;
  const meetings=[]; let offset=0;
  VENUES.forEach((venue,vi)=>{
    const r=rng(vi*9999+1), numRaces=8+Math.floor(r()*5), races=[];
    for(let i=0;i<numRaces;i++){
      const rr=rng(vi*9999+i*777+42), dist=venue.distances[Math.floor(rr()*venue.distances.length)];
      const grade=GRADES[Math.floor(rr()*GRADES.length)];
      const startTime=new Date(startMs+(offset*12+i*13+vi*3)*60000).toISOString();
      const runners=Array.from({length:dist<400?6:8},(_,bi)=>{
        const br=rng(vi*9999+i*777+bi*333+11);
        const odds=Math.round((1.5+br()*14)*10)/10;
        return { number:bi+1, name:dogName(br), trainer:TRAINERS[Math.floor(br()*TRAINERS.length)], form:formStr(br), bestTime:(dist/17.2+(br()-.5)*.8).toFixed(2), odds, placeOdds:Math.round((1+(odds-1)*.38)*100)/100 };
      });
      races.push({ id:`${venue.id}-r${i+1}`, raceNumber:i+1, raceName:`Race ${i+1} — ${dist}m`, distance:dist, grade, startTime, status:"Open", runners });
    }
    offset+=numRaces+2;
    meetings.push({...venue,races});
  });
  return meetings;
}

function generateResult(race) {
  const shuffled=[...race.runners].map(r=>({...r,score:Math.random()*(1/r.odds)+Math.random()*.3})).sort((a,b)=>b.score-a.score);
  const [win,p1,p2]=shuffled;
  return { positions:shuffled, placeRunners:[win.number,p1.number,p2.number],
    dividends:{ win:{runner:win.number,name:win.name,amount:(win.odds*.85).toFixed(2)},
      place:[{runner:win.number,name:win.name,amount:(win.odds*.30).toFixed(2)},{runner:p1.number,name:p1.name,amount:(p1.odds*.25).toFixed(2)},{runner:p2.number,name:p2.name,amount:(p2.odds*.22).toFixed(2)}],
      exacta:{runners:`${win.number}/${p1.number}`,amount:(win.odds*p1.odds*.7).toFixed(2)},
      quinella:{runners:`${Math.min(win.number,p1.number)}/${Math.max(win.number,p1.number)}`,amount:(Math.min(win.odds,p1.odds)*.9).toFixed(2)},
      trifecta:{runners:`${win.number}/${p1.number}/${p2.number}`,amount:(win.odds*p1.odds*p2.odds*.5).toFixed(2)} }};
}

function calcBetOutcome(bet, result) {
  if(!bet||!result) return null;
  const isWin=result.dividends.win.runner===bet.runnerNumber, isPlace=result.placeRunners.includes(bet.runnerNumber), stake=parseFloat(bet.stake)||0;
  if(bet.betType==="WIN"){const paid=isWin?+(stake*parseFloat(result.dividends.win.amount)).toFixed(2):0;return{status:isWin?"WIN":"LOST",paid,profit:+(paid-stake).toFixed(2)};}
  if(bet.betType==="PLACE"){const pd=result.dividends.place.find(p=>p.runner===bet.runnerNumber);const paid=isPlace&&pd?+(stake*parseFloat(pd.amount)).toFixed(2):0;return{status:isPlace?"PLACED":"LOST",paid,profit:+(paid-stake).toFixed(2)};}
  if(bet.betType==="EACH WAY"){const half=stake/2;const winPaid=isWin?+(half*parseFloat(result.dividends.win.amount)).toFixed(2):0;const pd=result.dividends.place.find(p=>p.runner===bet.runnerNumber);const placePaid=isPlace&&pd?+(half*parseFloat(pd.amount)).toFixed(2):0;const paid=+(winPaid+placePaid).toFixed(2);return{status:isWin?"WIN + PLACE":isPlace?"PLACE ONLY":"LOST",paid,profit:+(paid-stake).toFixed(2),winPaid,placePaid};}
  return null;
}

const fmtTime = iso => new Date(iso).toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit"});
const getMins  = iso => Math.max(0,Math.floor((new Date(iso)-Date.now())/60000));

// State accent colours — muted, editorial
const STATE_HUE  = { NSW:"#1a6b3a", VIC:"#1a4a8c", QLD:"#8c3a1a", WA:"#6b1a6b", SA:"#1a6b6b", TAS:"#3a1a6b" };
const STATE_PALE = { NSW:"#e8f4ec", VIC:"#e8eef8", QLD:"#f8ede8", WA:"#f3e8f3", SA:"#e8f3f3", TAS:"#ede8f3" };

// ─── BOX NUMBER CHIP ──────────────────────────────────────────────────────────
const BOX_COLORS = ["#1a6b3a","#c0392b","#1a4a8c","#f39c12","#6b1a6b","#2c3e50","#c0392b","#1a6b6b"];
function BoxChip({n,size=20}){
  return <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:size,height:size,borderRadius:3,background:BOX_COLORS[(n-1)%BOX_COLORS.length],color:"#fff",fontFamily:"'DM Mono',monospace",fontSize:size*.55,fontWeight:700,flexShrink:0}}>{n}</span>;
}

// ─── BET SELECTOR ─────────────────────────────────────────────────────────────
function BetSelector({bet,race,onChange}){
  const types=["WIN","PLACE","EACH WAY"];
  const runner=race.runners.find(r=>r.number===bet.runnerNumber);
  const stake=parseFloat(bet.stake)||0;
  const tCol={WIN:"#b8860b",PLACE:"#1a4a8c","EACH WAY":"#1a6b3a"};
  const tBg ={WIN:"#fdf8e8",PLACE:"#e8eef8","EACH WAY":"#e8f4ec"};

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,flexWrap:"wrap"}}>
        {runner&&(
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <BoxChip n={runner.number} size={22}/>
            <span style={{fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:700,color:"#1a1a1a"}}>{runner.name}</span>
            <span style={{padding:"2px 7px",background:"#fdf8e8",border:"1px solid #d4a830",color:"#b8860b",fontSize:10,borderRadius:3,fontFamily:"'DM Mono',monospace"}}>WIN ${runner.odds}</span>
            <span style={{padding:"2px 7px",background:"#e8eef8",border:"1px solid #6b8cbf",color:"#1a4a8c",fontSize:10,borderRadius:3,fontFamily:"'DM Mono',monospace"}}>PLC ${runner.placeOdds}</span>
          </div>
        )}
        <select value={bet.runnerNumber}
          onChange={e=>{const n=parseInt(e.target.value);const r=race.runners.find(x=>x.number===n);onChange({...bet,runnerNumber:n,winOdds:r?.odds||0,placeOdds:r?.placeOdds||0});}}
          style={{padding:"5px 10px",background:"#fff",border:"1px solid #ddd",color:"#333",fontFamily:"'DM Mono',monospace",fontSize:11,borderRadius:4,cursor:"pointer",outline:"none"}}>
          {race.runners.map(r=><option key={r.number} value={r.number}>Box {r.number} — {r.name}</option>)}
        </select>
      </div>

      <div style={{display:"flex",gap:6}}>
        {types.map(t=>(
          <button key={t} onClick={()=>onChange({...bet,betType:t})} style={{
            flex:1,padding:"8px 4px",
            background:bet.betType===t?tBg[t]:"#f8f8f8",
            border:`1.5px solid ${bet.betType===t?tCol[t]:"#e0e0e0"}`,
            color:bet.betType===t?tCol[t]:"#888",
            fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:bet.betType===t?700:400,
            cursor:"pointer",borderRadius:4,transition:"all .15s"
          }}>{t}</button>
        ))}
      </div>

      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <span style={{fontSize:10,color:"#888",letterSpacing:1,whiteSpace:"nowrap",fontFamily:"'DM Mono',monospace"}}>STAKE $</span>
        <input type="number" min="1" step="1" value={bet.stake}
          onChange={e=>onChange({...bet,stake:e.target.value})}
          style={{flex:1,padding:"7px 10px",background:"#fff",border:"1px solid #ddd",color:"#1a1a1a",fontFamily:"'DM Mono',monospace",fontSize:13,borderRadius:4,outline:"none"}}/>
        {[5,10,20,50].map(v=>(
          <button key={v} onClick={()=>onChange({...bet,stake:String(v)})} style={{
            padding:"6px 9px",
            background:bet.stake===String(v)?"#1a6b3a":"#f4f4f4",
            border:`1px solid ${bet.stake===String(v)?"#1a6b3a":"#e0e0e0"}`,
            color:bet.stake===String(v)?"#fff":"#666",
            fontFamily:"'DM Mono',monospace",fontSize:10,cursor:"pointer",borderRadius:4,transition:"all .15s"
          }}>{v}</button>
        ))}
      </div>

      {stake>0&&runner&&(
        <div style={{display:"flex",gap:8}}>
          {(bet.betType==="WIN"||bet.betType==="EACH WAY")&&(
            <div style={{flex:1,padding:"9px 12px",background:"#fdf8e8",border:"1px solid #e8c84a",borderRadius:4}}>
              <div style={{fontSize:9,color:"#b8860b",letterSpacing:1,marginBottom:2,fontFamily:"'DM Mono',monospace"}}>WIN RETURN</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:"#b8860b"}}>${(stake*(bet.betType==="EACH WAY"?.5:1)*runner.odds).toFixed(2)}</div>
            </div>
          )}
          {(bet.betType==="PLACE"||bet.betType==="EACH WAY")&&(
            <div style={{flex:1,padding:"9px 12px",background:"#e8eef8",border:"1px solid #6b8cbf",borderRadius:4}}>
              <div style={{fontSize:9,color:"#1a4a8c",letterSpacing:1,marginBottom:2,fontFamily:"'DM Mono',monospace"}}>PLACE RETURN</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:"#1a4a8c"}}>${(stake*(bet.betType==="EACH WAY"?.5:1)*runner.placeOdds).toFixed(2)}</div>
            </div>
          )}
          {bet.betType==="EACH WAY"&&(
            <div style={{flex:1,padding:"9px 12px",background:"#e8f4ec",border:"1px solid #6bbf8c",borderRadius:4}}>
              <div style={{fontSize:9,color:"#1a6b3a",letterSpacing:1,marginBottom:2,fontFamily:"'DM Mono',monospace"}}>TOTAL STAKE</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:"#1a6b3a"}}>${stake.toFixed(2)}</div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const ALL_MEETINGS = generateMeetings();

function GreyhoundTipster(){
  const [meetings, setMeetings]              = useState(ALL_MEETINGS);
  const [isLive, setIsLive]                  = useState(false);
  const [picks,         setPicks]            = useState({});
  const [bets,          setBets]             = useState({});
  const [results,       setResults]          = useState({});
  const [loadingPick,   setLoadingPick]      = useState({});
  const [loadingResult, setLoadingResult]    = useState({});
  const [activeTab,     setActiveTab]        = useState("upcoming");
  const [selState,      setSelState]         = useState("ALL");
  const [selMeeting,    setSelMeeting]       = useState(null);
  const [selRace,       setSelRace]          = useState(null);
  const [,              tick]                = useState(0);

  useEffect(()=>{ const t=setInterval(()=>tick(n=>n+1),30000); return()=>clearInterval(t); },[]);

  useEffect(()=>{
    fetch('/api/races')
      .then(r=>r.json())
      .then(d=>{
        if(d.meetings&&d.meetings.length>0){setMeetings(d.meetings);setIsLive(true);}
      })
      .catch(()=>{});
  },[]);

  const allRaces       = meetings.flatMap(m=>m.races.map(r=>({...r,meeting:m.name,state:m.state,venueId:m.id})));
  const completedIds   = new Set(Object.keys(results));
  const upcomingRaces  = allRaces.filter(r=>!completedIds.has(r.id));
  const completedRaces = allRaces.filter(r=> completedIds.has(r.id));
  const nextRace       = [...upcomingRaces].sort((a,b)=>new Date(a.startTime)-new Date(b.startTime))[0];
  const states         = ["ALL",...Array.from(new Set(meetings.map(m=>m.state))).sort()];
  const filteredMtgs   = selState==="ALL" ? meetings : meetings.filter(m=>m.state===selState);

  const getAIPick = async(race)=>{
    const key=race.id; setLoadingPick(p=>({...p,[key]:true}));
    try{
      const prompt=`You are an expert greyhound racing analyst. Analyze these runners for ${race.raceName} at ${race.meeting} (${race.distance}m, ${race.grade}).

Runners:
${race.runners.map(r=>`Box ${r.number}: ${r.name} | Trainer: ${r.trainer} | Form: ${r.form} | Best: ${r.bestTime}s | Win: $${r.odds} Plc: $${r.placeOdds}`).join('\n')}

Respond ONLY with valid JSON, no markdown:
{"winner":{"number":1,"name":"Name","confidence":"High"},"top3":[{"number":1,"name":"Name","reason":"brief"},{"number":2,"name":"Name","reason":"brief"},{"number":3,"name":"Name","reason":"brief"}],"analysis":"2 sentences.","bestBet":"Win","value":"brief"}`;
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      const pick=JSON.parse(data.content[0].text.replace(/```json|```/g,"").trim());
      setPicks(p=>({...p,[key]:pick}));
      const wr=race.runners.find(r=>r.number===pick.winner.number);
      const t=pick.bestBet?.toLowerCase().includes("each")?"EACH WAY":pick.bestBet?.toLowerCase().includes("place")?"PLACE":"WIN";
      setBets(b=>({...b,[key]:{runnerNumber:pick.winner.number,betType:t,stake:"10",winOdds:wr?.odds||0,placeOdds:wr?.placeOdds||0}}));
    }catch{
      const fb=race.runners.reduce((a,b)=>b.odds<a.odds?b:a);
      setPicks(p=>({...p,[key]:{winner:{number:fb.number,name:fb.name,confidence:"Medium"},top3:[...race.runners].sort((a,b)=>a.odds-b.odds).slice(0,3).map((r,i)=>({number:r.number,name:r.name,reason:i===0?"Market favourite":"Each-way chance"})),analysis:"Based on market pricing and form figures.",bestBet:"Win",value:"Watch late market moves."}}));
      setBets(b=>({...b,[key]:{runnerNumber:fb.number,betType:"WIN",stake:"10",winOdds:fb.odds,placeOdds:fb.placeOdds}}));
    }
    setLoadingPick(p=>({...p,[key]:false}));
  };

  const simulateResult=(race)=>{
    setLoadingResult(p=>({...p,[race.id]:true}));
    setTimeout(()=>{ setResults(r=>({...r,[race.id]:generateResult(race)})); setLoadingResult(p=>({...p,[race.id]:false})); },1500);
  };

  const ledger=completedRaces.reduce((acc,race)=>{
    const outcome=calcBetOutcome(bets[race.id],results[race.id]);
    if(!outcome) return acc;
    acc.staked+=parseFloat(bets[race.id].stake)||0; acc.returns+=outcome.paid; acc.profit+=outcome.profit; acc.count++; if(outcome.status!=="LOST") acc.winners++;
    return acc;
  },{staked:0,returns:0,profit:0,count:0,winners:0});

  // ── STYLES ────────────────────────────────────────────────────────────────
  const S = {
    page:    { minHeight:"100vh", background:"#f5f2ed", fontFamily:"'DM Sans',sans-serif", color:"#1a1a1a" },
    header:  { background:"#1a1a1a", color:"#fff", padding:"0 24px" },
    card:    { background:"#fff", border:"1px solid #e8e4de", borderRadius:6, overflow:"hidden", marginBottom:8, boxShadow:"0 1px 3px rgba(0,0,0,.06)" },
    section: { fontSize:9, fontWeight:700, letterSpacing:2.5, color:"#888", textTransform:"uppercase", fontFamily:"'DM Mono',monospace", marginBottom:8 },
    label:   { fontSize:9, fontWeight:600, letterSpacing:1.5, color:"#999", textTransform:"uppercase", fontFamily:"'DM Mono',monospace" },
    pill:    (bg,text,border)=>({ padding:"2px 8px", background:bg, border:`1px solid ${border}`, color:text, fontSize:10, borderRadius:3, fontFamily:"'DM Mono',monospace", fontWeight:600 }),
  };

  return(
    <div style={S.page}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;600&display=swap');
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        @keyframes shimmer{0%{opacity:.6}50%{opacity:1}100%{opacity:.6}}
        .fade-up{animation:fadeUp .3s ease forwards}
        .rrow:hover{background:#f8f6f2!important}
        input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
        button,select{font-family:inherit;cursor:pointer}
        button:active{transform:scale(.98)}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#f0ece6}::-webkit-scrollbar-thumb{background:#c8c0b4;border-radius:4px}
        a{color:inherit}
      `}</style>

      {/* ── MASTHEAD ── */}
      <div style={S.header}>
        <div style={{maxWidth:1100,margin:"0 auto",display:"flex",alignItems:"stretch",gap:0}}>
          <div style={{padding:"18px 24px 18px 0",borderRight:"1px solid #333",marginRight:24}}>
            <div style={{fontSize:9,letterSpacing:3,color:"#888",marginBottom:4,fontFamily:"'DM Mono',monospace"}}>ESTABLISHED 2024</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:"clamp(28px,5vw,44px)",fontWeight:900,lineHeight:1,letterSpacing:-1}}>
              GREYHOUND<br/><span style={{color:"#c8a84a"}}>ORACLE</span>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",justifyContent:"center",gap:4,padding:"0 0 0 0"}}>
            <div style={{fontSize:10,color:"#666",fontFamily:"'DM Mono',monospace"}}>{meetings.length} MEETINGS · {allRaces.length} RACES · AUSTRALIA{isLive&&<span style={{color:"#4caf76",marginLeft:8}}>● LIVE</span>}</div>
            {nextRace&&(
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{width:6,height:6,borderRadius:"50%",background:"#4caf76",display:"inline-block",animation:"shimmer 1.5s infinite"}}/>
                <span style={{fontSize:11,color:"#aaa"}}>Next:</span>
                <span style={{fontSize:11,color:"#fff",fontWeight:600}}>{nextRace.meeting} R{nextRace.raceNumber}</span>
                <span style={{fontSize:10,color:"#c8a84a",fontFamily:"'DM Mono',monospace"}}>{getMins(nextRace.startTime)}m · {fmtTime(nextRace.startTime)}</span>
              </div>
            )}
          </div>
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8,padding:"18px 0"}}>
            {completedRaces.length>0&&[
              {l:"Staked",v:`$${ledger.staked.toFixed(0)}`,c:"#aaa"},
              {l:"Returns",v:`$${ledger.returns.toFixed(0)}`,c:"#6b9fd4"},
              {l:"P/L",v:`${ledger.profit>=0?"+":""}$${ledger.profit.toFixed(0)}`,c:ledger.profit>=0?"#4caf76":"#e05a4e"},
              {l:"Strike",v:`${ledger.count?Math.round(ledger.winners/ledger.count*100):0}%`,c:"#c8a84a"},
            ].map(s=>(
              <div key={s.l} style={{textAlign:"center",padding:"6px 12px",borderLeft:"1px solid #333"}}>

                                    {l:"Quinella", d:result.dividends.quinella.runners,              a:result.dividends.quinella.amount,       c:"#1a4a8c",bg:"#e8eef8",border:"#6b8cbf"},
                                    {l:"Place 1",  d:`Box ${result.dividends.place[0].runner}`,      a:result.dividends.place[0].amount,       c:"#555",bg:"#f8f8f8",border:"#ddd"},
                                    {l:"Place 2",  d:`Box ${result.dividends.place[1].runner}`,      a:result.dividends.place[1].amount,       c:"#555",bg:"#f8f8f8",border:"#ddd"},
                                    {l:"Trifecta", d:result.dividends.trifecta.runners,              a:result.dividends.trifecta.amount,       c:"#6b1a6b",bg:"#f3e8f3",border:"#c89bcf"},
                                  ].map(div=>(
                                    <div key={div.l} style={{padding:"10px 12px",background:div.bg,border:`1px solid ${div.border}`,borderRadius:4}}>
                                      <div style={{...S.label,marginBottom:2}}>{div.l}</div>
                                      <div style={{fontSize:10,color:"#888",marginBottom:2,fontFamily:"'DM Mono',monospace"}}>{div.d}</div>
                                      <div style={{fontFamily:"'Playfair Display',serif",fontSize:19,fontWeight:700,color:div.c}}>${div.a}</div>
                                    </div>
                                  ))}
                                </div>
                              </div>

                              {/* Bet outcome */}
                              {outcome&&bet&&(()=>{
                                const won=outcome.status!=="LOST";
                                const statusC=outcome.status==="LOST"?"#c0392b":outcome.status.includes("WIN")?"#b8860b":"#1a4a8c";
                                return(
                                  <div style={{...S.card,padding:14,borderLeft:`3px solid ${statusC}`}}>
                                    <div style={S.section}>Your Bet Result</div>
                                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:bet.betType==="EACH WAY"?8:0}}>
                                      {[
                                        {l:"Staked",   v:`$${parseFloat(bet.stake).toFixed(2)}`,    bg:"#f8f8f8",  c:"#333",   border:"#ddd"},
                                        {l:"Returned", v:`$${outcome.paid.toFixed(2)}`,             bg:"#e8eef8",  c:"#1a4a8c",border:"#6b8cbf"},
                                        {l:"Profit",   v:`${outcome.profit>=0?"+":"-"}$${Math.abs(outcome.profit).toFixed(2)}`, bg:won?"#e8f4ec":"#fce8e8", c:won?"#1a6b3a":"#c0392b", border:won?"#6bbf8c":"#f0c0c0"},
                                      ].map(x=>(
                                        <div key={x.l} style={{padding:"10px 12px",background:x.bg,border:`1px solid ${x.border}`,borderRadius:4,textAlign:"center"}}>
                                          <div style={S.label}>{x.l}</div>
                                          <div style={{fontFamily:"'Playfair Display',serif",fontSize:21,fontWeight:700,color:x.c}}>{x.v}</div>
                                        </div>
                                      ))}
                                    </div>
                                    {bet.betType==="EACH WAY"&&(
                                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                                        <div style={{padding:"9px 12px",background:"#fdf8e8",border:"1px solid #e8c84a",borderRadius:4}}>
                                          <div style={S.label}>Win Leg (${(parseFloat(bet.stake)/2).toFixed(2)})</div>
                                          <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:"#b8860b"}}>${(outcome.winPaid||0).toFixed(2)}</div>
                                          <div style={{fontSize:10,color:"#aaa"}}>{outcome.winPaid>0?"✓ Collected":"✗ Not placed"}</div>
                                        </div>
                                        <div style={{padding:"9px 12px",background:"#e8eef8",border:"1px solid #6b8cbf",borderRadius:4}}>
                                          <div style={S.label}>Place Leg (${(parseFloat(bet.stake)/2).toFixed(2)})</div>
                                          <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:"#1a4a8c"}}>${(outcome.placePaid||0).toFixed(2)}</div>
                                          <div style={{fontSize:10,color:"#aaa"}}>{outcome.placePaid>0?"✓ Collected":"✗ Not placed"}</div>
                                        </div>
                                      </div>
                                    )}
                                    <div style={{textAlign:"center",padding:"8px",background:won?"#e8f4ec":"#fce8e8",border:`1px solid ${won?"#6bbf8c":"#f0c0c0"}`,borderRadius:4}}>
                                      <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:700,color:statusC,letterSpacing:.5}}>{outcome.status}</div>
                                    </div>
                                  </div>
                                );
                              })()}
                            </div>
                          )}
                        </div>
                      );
                    })()}
                  </div>
                );
              })()}
            </div>
          </div>
        )}

        {/* ══ RESULTS ══ */}
        {activeTab==="results"&&(
          <div>
            {completedRaces.length===0&&(
              <div style={{textAlign:"center",padding:"80px 20px"}}>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:"#ccc",marginBottom:8}}>No Results Yet</div>
                <div style={{fontSize:13,color:"#aaa"}}>Open a race, get AI tips, then simulate a result</div>
              </div>
            )}
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {completedRaces.map((race,idx)=>{
                const result=results[race.id], bet=bets[race.id], outcome=calcBetOutcome(bet,result);
                const won=outcome&&outcome.status!=="LOST";
                const statusC=!outcome?"#aaa":outcome.status==="LOST"?"#c0392b":outcome.status.includes("WIN")?"#b8860b":"#1a4a8c";
                const hue=STATE_HUE[race.state]||"#1a6b3a";

                return(
                  <div key={race.id} className="fade-up" style={{...S.card,borderLeft:`3px solid ${statusC}`,animationDelay:`${idx*.04}s`}}>
                    <div style={{padding:"12px 16px",borderBottom:"1px solid #f0ece6",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                          <span style={{fontSize:9,fontWeight:700,color:hue,letterSpacing:2,fontFamily:"'DM Mono',monospace"}}>{race.state}</span>
                          <span style={{fontSize:9,color:"#aaa",fontFamily:"'DM Mono',monospace"}}>{race.meeting} · R{race.raceNumber}</span>
                        </div>
                        <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:"#1a1a1a"}}>{race.raceName}</div>
                        {bet&&(
                          <div style={{marginTop:4,display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                            <span style={{fontSize:10,color:"#aaa"}}>Bet:</span>
                            <BoxChip n={bet.runnerNumber} size={16}/>
                            <span style={{fontSize:10,color:"#555"}}>{race.runners.find(r=>r.number===bet.runnerNumber)?.name}</span>
                            <span style={{...S.pill(bet.betType==="WIN"?"#fdf8e8":bet.betType==="PLACE"?"#e8eef8":"#e8f4ec",bet.betType==="WIN"?"#b8860b":bet.betType==="PLACE"?"#1a4a8c":"#1a6b3a",bet.betType==="WIN"?"#e8c84a":bet.betType==="PLACE"?"#6b8cbf":"#6bbf8c")}}>{bet.betType}</span>
                            <span style={{fontSize:10,color:"#888",fontFamily:"'DM Mono',monospace"}}>${parseFloat(bet.stake).toFixed(2)}</span>
                          </div>
                        )}
                      </div>
                      {outcome&&(
                        <div style={{textAlign:"right"}}>
                          <div style={{...S.pill(won?"#e8f4ec":"#fce8e8",statusC,won?"#6bbf8c":"#f0c0c0"),marginBottom:6,display:"inline-block"}}>{outcome.status}</div>
                          <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:outcome.profit>=0?"#1a6b3a":"#c0392b"}}>
                            {outcome.profit>=0?"+":"-"}${Math.abs(outcome.profit).toFixed(2)}
                          </div>
                        </div>
                      )}
                    </div>

                    <div style={{padding:"10px 16px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                      <div>
                        <div style={S.section}>Result</div>
                        {result.positions.slice(0,3).map((dog,pos)=>{
                          const isBet=dog.number===bet?.runnerNumber;
                          return(
                            <div key={dog.number} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",marginBottom:3,borderRadius:4,
                              background:pos===0?"#fffdf0":pos===1?"#f8f8f8":"#fdf5f0",
                              border:`1px solid ${isBet?"#e8c84a":"transparent"}`}}>
                              <span style={{fontSize:11,fontWeight:700,color:pos===0?"#b8860b":pos===1?"#888":"#cd7f32",width:14}}>{pos+1}</span>
                              <BoxChip n={dog.number} size={18}/>
                              <span style={{flex:1,fontSize:11,fontWeight:isBet?700:400,color:"#1a1a1a"}}>{dog.name}</span>
                              <span style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:"#b8860b",fontWeight:600}}>${dog.odds}</span>
                            </div>
                          );
                        })}
                      </div>
                      <div>
                        <div style={S.section}>Key Dividends</div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
                          {[
                            {l:"Win",      d:`Box ${result.dividends.win.runner}`,  a:result.dividends.win.amount,          c:"#b8860b",bg:"#fdf8e8",border:"#e8c84a"},
                            {l:"Place 1",  d:`Box ${result.dividends.place[0].runner}`, a:result.dividends.place[0].amount, c:"#555",bg:"#f8f8f8",border:"#ddd"},
                            {l:"Exacta",   d:result.dividends.exacta.runners,            a:result.dividends.exacta.amount,   c:"#1a6b3a",bg:"#e8f4ec",border:"#6bbf8c"},
                            {l:"Trifecta", d:result.dividends.trifecta.runners,          a:result.dividends.trifecta.amount, c:"#6b1a6b",bg:"#f3e8f3",border:"#c89bcf"},
                          ].map(div=>(
                            <div key={div.l} style={{padding:"7px 9px",background:div.bg,border:`1px solid ${div.border}`,borderRadius:4}}>
                              <div style={{...S.label,fontSize:8,marginBottom:1}}>{div.l}</div>
                              <div style={{fontSize:9,color:"#aaa",fontFamily:"'DM Mono',monospace",marginBottom:2}}>{div.d}</div>
                              <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:div.c}}>${div.a}</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        <div style={{textAlign:"center",marginTop:32,padding:"16px 0",borderTop:"1px solid #e8e4de"}}>
          <div style={{fontSize:10,color:"#bbb",letterSpacing:1,fontFamily:"'DM Mono',monospace"}}>
            GREYHOUND ORACLE · FOR ENTERTAINMENT ONLY · GAMBLE RESPONSIBLY · DATA SIMULATED
          </div>
        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GreyhoundTipster />);
  </script>
</body>
</html>
